<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="form-container">

    <div class="form-card">

        <h1>🏦 Loan Prediction Form</h1>

        <form action="/submit" method="POST">

            <div class="grid">

                <div class="input-box">
                    <label>Gender</label>
                    <select name="Gender">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Married</label>
                    <select name="Married">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Dependents</label>
                    <input type="number" name="Dependents" required>
                </div>

                <div class="input-box">
                    <label>Education</label>
                    <select name="Education">
                        <option value="0">Graduate</option>
                        <option value="1">Not Graduate</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Self Employed</label>
                    <select name="Self_Employed">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Applicant Income</label>
                    <input type="number" name="ApplicantIncome" required>
                </div>

                <div class="input-box">
                    <label>Coapplicant Income</label>
                    <input type="number" name="CoapplicantIncome" required>
                </div>

                <div class="input-box">
                    <label>Loan Amount</label>
                    <input type="number" name="LoanAmount" required>
                </div>

                <div class="input-box">
                    <label>Loan Term</label>
                    <input type="number" name="Loan_Amount_Term" required>
                </div>

                <div class="input-box">
                    <label>Credit History</label>
                    <select name="Credit_History">
                        <option value="1">Good</option>
                        <option value="0">Bad</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Property Area</label>
                    <select name="Property_Area">
                        <option value="0">Rural</option>
                        <option value="1">Urban</option>
                        <option value="2">Semi Urban</option>
                    </select>
                </div>

            </div>

            <button class="predict-btn" type="submit">
                Predict Loan
            </button>

        </form>

    </div>

</div>

</body>
</html>
