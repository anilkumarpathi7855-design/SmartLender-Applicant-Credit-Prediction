<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction</title>
</head>
<body>

<h2>Loan Prediction Form</h2>

<form action="/submit" method="POST">

<label>Gender</label>
<select name="Gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<br><br>

<label>Married</label>
<select name="Married">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<br><br>

<label>Dependents</label>
<input type="number" name="Dependents">

<br><br>

<label>Education</label>
<select name="Education">
<option value="0">Graduate</option>
<option value="1">Not Graduate</option>
</select>

<br><br>

<label>Self Employed</label>
<select name="Self_Employed">
<option value="0">No</option>
<option value="1">Yes</option>
</select>

<br><br>

<label>Applicant Income</label>
<input type="number" name="ApplicantIncome">

<br><br>

<label>Coapplicant Income</label>
<input type="number" name="CoapplicantIncome">

<br><br>

<label>Loan Amount</label>
<input type="number" name="LoanAmount">

<br><br>

<label>Loan Term</label>
<input type="number" name="Loan_Amount_Term">

<br><br>

<label>Credit History</label>
<select name="Credit_History">
<option value="1">Good (1)</option>
<option value="0">Bad (0)</option>
</select>

<br><br>

<label>Property Area</label>
<select name="Property_Area">
<option value="0">Rural</option>
<option value="1">Urban</option>
<option value="2">Semiurban</option>
</select>

<br><br>

<button type="submit">Predict Loan</button>

</form>

</body>
</html>
